# Hosted Training starter config generated by the local /train page.
# Prime CLI 0.6.x launches Hub environments through the classic env-server
# adapter, while the package also retains its native v1 Taskset for local evals.
name = "MazeBench"
model = "Qwen/Qwen3.5-0.8B"
max_steps = 10
batch_size = 32
rollouts_per_example = 4

[sampling]
max_tokens = 512
temperature = 1.0

[[env]]
id = "mazebench/mazebench"
version = "0.1.15"

[env.args]
num_train_examples = 1
num_eval_examples = 1
start_level_id = "level_HxI"
game_won_gem_count = 100
gem_reward_weight = 1.0
room_reward_weight = 0.1
push_reward_weight = 0.05
max_actions = 64
allow_quit = false
auto_quit = true
auto_quit_threshold = 10.0
auto_quit_mode = "rolling"
auto_quit_window = 100
observation_mode = "ascii"
