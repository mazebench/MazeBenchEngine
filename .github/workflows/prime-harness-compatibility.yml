name: Prime harness compatibility

on:
  workflow_dispatch:
  schedule:
    - cron: "17 15 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Advance exact Verifiers pin
        id: verifiers
        run: echo "revision=$(python scripts/maze-update-verifiers-pin.py)" >> "$GITHUB_OUTPUT"
      - name: Resolve and install pinned environment
        working-directory: environments/mazebench
        run: |
          uv lock --upgrade-package verifiers
          uv sync --locked
      - name: Discover and certify every Prime harness
        run: |
          uv run --project environments/mazebench python scripts/maze-prime-harness-catalog.py --write environments/mazebench/prime-harness-catalog.json
          uv run --project environments/mazebench python scripts/maze-certify-prime-harnesses.py --self-test --write environments/mazebench/prime-harness-certification.json
          uv run --project environments/mazebench python scripts/maze-verify-prime-tools.py --self-test
          uv run --project environments/mazebench python scripts/maze-verify-prime-resume.py --self-test
          npm run sync-runtime
          node tests/prime-custom-harness.test.js
          node tests/prime-harnesses.test.js
          node tests/runtime-drift.test.js
      - name: Open compatibility update
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
          REVISION: ${{ steps.verifiers.outputs.revision }}
        run: |
          if git diff --quiet; then
            echo "Already current."
            exit 0
          fi
          branch="automation/prime-harnesses-${REVISION:0:12}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add environments/mazebench/pyproject.toml environments/mazebench/uv.lock environments/mazebench/prime-harness-catalog.json environments/mazebench/prime-harness-certification.json environments/mazebench/mazebench/runtime/environments/mazebench environments/mazebench_agent/mazebench_agent/runtime.tar.gz
          git commit -m "chore: refresh Prime harness compatibility"
          git push --force-with-lease origin "HEAD:$branch"
          gh pr view "$branch" >/dev/null 2>&1 || gh pr create \
            --base main \
            --head "$branch" \
            --title "chore: refresh Prime harness compatibility" \
            --body "Automated exact-pin update for Prime Verifiers. The generated catalog and local safety certification passed for every discovered built-in harness."
