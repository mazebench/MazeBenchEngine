# Publish the `mazebench` package to PyPI.
#
# Trigger: publishing a GitHub Release (or manually via workflow_dispatch).
#
# One-time setup on PyPI (no API tokens needed — uses trusted publishing):
#   1. https://pypi.org/manage/account/publishing/ -> "Add a new pending publisher"
#   2. PyPI project name: mazebench
#      Owner:             mazebench            (this GitHub org/user)
#      Repository:        MazeBenchEngine      (this repo)
#      Workflow name:     publish.yml
#      Environment:       pypi
#   3. Create a GitHub environment named "pypi" in the repo settings.
#
# Release flow: bump `version` in pyproject.toml, tag + publish a GitHub
# Release, and this workflow builds the self-contained wheel (Node runtime
# bundled) and uploads it.

name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: environments/mazebench/uv.lock

      - run: npm ci

      - name: Install Chromium for vision integration tests
        run: npx playwright-core install --with-deps chromium

      - name: Node test suite
        run: npm test

      - name: Stage the Node runtime into the Python package
        run: node scripts/build-python-runtime.js

      - name: Build wheel + sdist
        run: |
          python -m pip install --quiet build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
