name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: environments/mazebench/uv.lock

      - run: npm ci

      - name: Node test suite
        run: npm test

      - name: Stage the Python runtime
        run: node scripts/build-python-runtime.js

      - name: Build wheel + sdist
        run: |
          python -m pip install --quiet build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Prove the supported Python range on every run: the oldest we claim
  # (requires-python >= 3.9) and the newest stable release.
  wheel-smoke:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.14"]
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install the wheel (with the prime extra) and launch the site
        run: |
          python -m venv /tmp/mzvenv
          /tmp/mzvenv/bin/pip install --quiet "$(ls dist/mazebench-*.whl)[prime]"
          cd /
          MAZEBENCH_HOME=/tmp/mzhome nohup /tmp/mzvenv/bin/mazebench launch port=3311 open=false > /tmp/launch.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf -o /dev/null http://127.0.0.1:3311/ && break
            sleep 1
          done
          for path in / /play /build /agent /play/maze/level_HxI /api/play/maze/level_HxI /vendor/three.module.js; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:3311$path")
            echo "$path -> $code"
            [ "$code" = "200" ] || { cat /tmp/launch.log; exit 1; }
          done
