name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Node test suite
        run: npm test

      - name: Stage the Python runtime (packaging smoke test)
        run: node scripts/build-python-runtime.js

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel + sdist
        run: |
          python -m pip install --quiet build
          python -m build

      - name: Smoke-test `mazebench launch` from the wheel
        run: |
          python -m venv /tmp/mzvenv
          /tmp/mzvenv/bin/pip install --quiet dist/mazebench-*.whl
          cd /
          MAZEBENCH_HOME=/tmp/mzhome nohup /tmp/mzvenv/bin/mazebench launch port=3311 open=false > /tmp/launch.log 2>&1 &
          for i in $(seq 1 60); do
            curl -sf -o /dev/null http://127.0.0.1:3311/ && break
            sleep 1
          done
          for path in / /play /build /agent /play/maze/level_HxI /api/play/maze/level_HxI /vendor/three.module.js; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:3311$path")
            echo "$path -> $code"
            [ "$code" = "200" ] || { cat /tmp/launch.log; exit 1; }
          done
