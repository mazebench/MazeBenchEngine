name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  # Keep the merge gate dependency-free and quick. The complete browser,
  # Python packaging, and wheel matrix still run after every push to main.
  pr-smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python CLI tests
        run: python -m unittest tests/test_mazebench_cli.py

      - name: Core PR smoke suite
        run: npm run test:pr

  test:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/.cache/ms-playwright
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: environments/mazebench/uv.lock

      - run: npm ci

      - name: Python CLI tests
        run: python -m unittest tests/test_mazebench_cli.py

      - name: Install Chromium for vision integration tests
        run: npx playwright-core install --with-deps chromium

      - name: Node test suite
        run: npm test

      - name: Stage the Python runtime
        run: node scripts/build-python-runtime.js

      - name: Build wheel + sdist
        run: |
          python -m pip install --quiet build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Prove the supported Python range on every full run: the oldest we claim
  # (requires-python >= 3.9) and the newest stable release.
  wheel-smoke:
    if: github.event_name != 'pull_request'
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.14"]
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install the wheel (with the prime extra) and launch the site
        run: |
          python -m venv /tmp/mzvenv
          /tmp/mzvenv/bin/pip install --quiet "$(ls dist/mazebench-*.whl)[prime]"
          cd /
          MAZEBENCH_HOME=/tmp/mzhome /tmp/mzvenv/bin/mazebench ascii --level CxD --once > /tmp/ascii.txt
          grep -q 'maze level_CxD' /tmp/ascii.txt
          MAZEBENCH_HOME=/tmp/mzhome /tmp/mzvenv/bin/mazebench json --level CxD --omniscient > /tmp/json.txt
          python - <<'PY'
          import json
          payload = json.load(open('/tmp/json.txt', encoding='utf8'))
          assert payload['observation_mode'] == 'json'
          assert payload['json_observation']['omniscient'] is True
          assert payload['json_observation']['hide_names'] is False
          assert payload['json_observation']['objects']['wall']
          assert 'level' not in payload and 'screen' not in payload
          PY
          MAZEBENCH_HOME=/tmp/mzhome nohup /tmp/mzvenv/bin/mazebench launch port=3311 open=false > /tmp/launch.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          ready=false
          for i in $(seq 1 60); do
            if curl -sf -o /dev/null http://127.0.0.1:3311/; then
              ready=true
              break
            fi
            if ! kill -0 "$server_pid" 2>/dev/null; then
              echo "MazeBench exited before becoming ready"
              cat /tmp/launch.log
              exit 1
            fi
            sleep 1
          done
          if [ "$ready" != "true" ]; then
            echo "MazeBench did not become ready within 60 seconds"
            cat /tmp/launch.log
            exit 1
          fi
          for path in / /play /build /agent /play/maze/level_HxI /api/play/maze/level_HxI /vendor/three.module.js; do
            code=$(curl -sL -o /dev/null -w '%{http_code}' "http://127.0.0.1:3311$path" || true)
            echo "$path -> $code"
            [ "$code" = "200" ] || { cat /tmp/launch.log; exit 1; }
          done
