# Optional CLI equivalent of an Agent-page Codex run. The /agent page does not
# read this file: it persists each launch in run.json, while Verifiers writes a
# resolved config.toml beside every eval. Re-run this example with:
#   uv run eval @ example.toml

model = "openai/gpt-5"
num_rollouts = 1
max_turns = 20
rich = false
push = false

[taskset]
id = "mazebench-tools"
num_examples = 1
start_level_id = "level_HxI"
game_won_gem_count = 100
max_actions = 20
observation_mode = "ascii"

[taskset.tools]
colocated = false

[harness]
# This adapter is selected automatically when Custom > Codex is launched from
# /agent. Other discovered native harnesses use their upstream id directly;
# non-MCP command harnesses use mazebench_cli_harness plus upstream_id.
id = "mazebench_codex_harness"
multi_agent = false

[harness.runtime]
type = "prime"
image = "node:24-bookworm-slim"
workdir = "/app"
cpu = 2
memory = 4
disk = 8
